<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kholhang eCashBook</title>
  <meta name="description" content="Income, expenditure and cashbook reports in INR. Open the app." />
  <link rel="canonical" href="cashbook.html" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface2: #243044;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --income: #22c55e;
      --expense: #ef4444;
      --accent: #3b82f6;
      --radius: 16px;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(160deg, #0a0e14 0%, #152238 50%, #0f1419 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.25rem;
      line-height: 1.5;
    }
    .wrap { width: 100%; max-width: 400px; }

    a.launch-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      padding: 1.5rem 1.35rem 1.35rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    a.launch-card:hover {
      transform: translateY(-4px);
      border-color: rgba(59, 130, 246, 0.45);
      box-shadow: 0 16px 48px rgba(37, 99, 235, 0.25);
    }
    a.launch-card:active { transform: translateY(-1px); }

    .card-icon {
      width: 3rem;
      height: 3rem;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 1rem;
    }
    .card-title { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; }
    .card-sub { color: var(--muted); font-size: 0.88rem; margin-top: 0.35rem; }

    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.45rem;
      margin: 1.15rem 0 1.1rem;
    }
    .pill {
      font-size: 0.68rem;
      text-align: center;
      padding: 0.45rem 0.25rem;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .pill strong { display: block; font-size: 0.72rem; margin-bottom: 0.15rem; }
    .pill.income strong { color: var(--income); }
    .pill.expense strong { color: var(--expense); }
    .pill.report strong { color: var(--accent); }

    .card-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .card-cta span { opacity: 0.9; font-size: 1.1rem; }

    .card-hint {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.85rem;
    }

    .links {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.8rem;
    }
    .links a { color: var(--accent); text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="launch-card" href="cashbook.html" id="open-app">
      <div class="card-icon" aria-hidden="true">₹</div>
      <div class="card-title">Kholhang eCashBook</div>
      <p class="card-sub">Personal cashbook · INR · XML backup · 4-digit confirm</p>

      <div class="card-stats" aria-hidden="true">
        <div class="pill expense"><strong>Expenditure</strong>Track spends</div>
        <div class="pill income"><strong>Income</strong>Track inflow</div>
        <div class="pill report"><strong>Report</strong>Ledger &amp; export</div>
      </div>

      <div class="card-cta">
        <span aria-hidden="true">▶</span>
        Open cashbook
      </div>
      <p class="card-hint">Click anywhere on this card to run the app</p>
    </a>

    <p class="links">
      <a href="cashbook.html">Direct link</a>
      ·
      <a href="https://github.com/jugaad-online/Kholhang-eCashBook">GitHub</a>
      ·
      <a href="README.md">Documentation</a>
    </p>
  </div>
</body>
</html>
